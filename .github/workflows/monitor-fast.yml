name: monitor-fast

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-fast
  cancel-in-progress: false

jobs:
  monitor:
    uses: ./.github/workflows/monitor-feed-reusable.yml
    with:
      cadence: fast
      commit-suffix: fast
    secrets: inherit
